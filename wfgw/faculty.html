<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Faculty Dashboard</h2>
        <div id="noRequests" style="text-align: center; color: #777;">
            <p>No pending out-pass requests.</p>
        </div>
        
        <div id="requestDetails" style="display: none;">
            <h3>New Out-Pass Request:</h3>
            <p><strong>Destination:</strong> <span id="reqAddress"></span></p>
            <p><strong>Leave Date:</strong> <span id="reqDate"></span></p>
            <p><strong>Out Time:</strong> <span id="reqOutTime"></span></p>
            <p><strong>Expected In Time:</strong> <span id="reqInTime"></span></p>
            <p><strong>Days:</strong> <span id="reqDays"></span></p>
            <p><strong>Reason:</strong> <span id="reqReason"></span></p>
            
            <div style="display: flex; gap: 15px; margin-top: 20px;">
                <button id="approveBtn" style="background-color: #28a745; flex: 1;">Approve</button>
                <button id="denyBtn" style="background-color: #dc3545; flex: 1;">Deny</button>
            </div>
        </div>
    </div>

    <script src="faculty.js"></script>
</body>
</html>
